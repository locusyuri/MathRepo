main:
  push:
    - name: "Sync to GitHub (code only)"
      stages:
        - name: push to GitHub
          script: |
            git config --global --add safe.directory "$(pwd)"
            git config --global user.name "locusyuri"
            git config --global user.email "sinthome@foxmail.com"

            git checkout -b github-main

            git rm --cached -r --ignore-unmatch "**/*.pdf" "*.pdf"
            git rm --cached --ignore-unmatch .gitattributes

            if ! git diff --cached --quiet; then
              git commit -m "chore: remove PDFs and LFS config for GitHub mirror"
            fi

            git push --force https://${GITHUB_TOKEN}@github.com/locusyuri/MathRepo.git github-main:main
